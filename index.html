<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة التوظيف الاحترافية</title>
  <meta http-equiv="refresh" content="0; url=ats-resume-builder%20(10).html">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #0f1923;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    .spinner {
      width: 56px;
      height: 56px;
      border: 4px solid rgba(79,152,163,0.2);
      border-top-color: #4f98a3;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.5rem; font-weight: 600; color: #4f98a3; }
    p { color: #94a3b8; font-size: 0.95rem; }
    a {
      color: #4f98a3;
      text-decoration: underline;
      font-size: 0.9rem;
      margin-top: 8px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <div>
      <h1>منصة التوظيف الاحترافية</h1>
      <p>جاري التحميل...</p>
      <a href="ats-resume-builder%20(10).html">انقر هنا إذا لم يتم التحويل تلقائياً</a>
    </div>
  </div>
</body>
</html>
